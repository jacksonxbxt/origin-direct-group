name: Daily Satellite Crop Monitor

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r tools/satellite-monitor/requirements.txt

      - name: Run satellite monitor
        run: cd tools/satellite-monitor && python monitor.py

      - name: Copy latest report to public directory
        run: cp tools/satellite-monitor/reports/latest_report.html public/intelligence-report.html

      - name: Commit and push updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/satellite-monitor/data/ tools/satellite-monitor/reports/ tools/satellite-monitor/cache/ public/intelligence-report.html
          git diff --staged --quiet || git commit -m "Daily satellite monitor update $(date +%Y-%m-%d)"
          git push
